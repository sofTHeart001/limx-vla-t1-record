# T2 grab_roller collection config.
# Mild visual randomization keeps the task close to clean eval while adding
# small camera and light variation for robustness.
render_freq: 0
episode_num: 400
use_seed: false
save_freq: 15
embodiment:
  - tron2_v5_DACH_validing
language_num: 1
domain_randomization:
  random_background: false
  cluttered_table: false
  clean_background_rate: 0
  random_head_camera_dis: 0.01
  random_table_height: 0
  random_light: true
  crazy_random_light_rate: 0.05
camera:
  head_camera_type: D435
  wrist_camera_type: D435
  collect_head_camera: true
  collect_wrist_camera: true
data_type:
  rgb: true
  third_view: false
  depth: false
  pointcloud: false
  endpose: true
  qpos: true
  mesh_segmentation: false
  actor_segmentation: false
pcd_down_sample_num: 1024
pcd_crop: true
save_path: ./data
clear_cache_freq: 1
collect_data: true
eval_video_log: false
